name: Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -e
            echo "Deploying microservices..."
            cd /home/ubuntu/app

            if command -v docker-compose >/dev/null 2>&1; then
              compose_cmd() { sudo docker-compose "$@"; }
            else
              compose_cmd() { sudo docker compose "$@"; }
            fi
            
            echo "Stopping existing services..."
            compose_cmd down || true
            
            echo "Pulling latest images..."
            compose_cmd pull
            
            echo "Starting services..."
            compose_cmd up -d
            
            echo "Waiting for services to start..."
            sleep 30
            
            echo "Checking service status..."
            compose_cmd ps
            
            echo "Services deployed successfully!"
            
      - name: Verify Deployment
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "Service URLs:"
          echo "  Frontend:       http://${{ secrets.EC2_PUBLIC_IP }}:8051"
          echo "  Eureka:         http://${{ secrets.EC2_PUBLIC_IP }}:8061"
          echo "  Swagger:        http://${{ secrets.EC2_PUBLIC_IP }}:8062/swagger-ui.html"
          echo "  Config Server:  http://${{ secrets.EC2_PUBLIC_IP }}:8060"
          echo "  RabbitMQ:       http://${{ secrets.EC2_PUBLIC_IP }}:15672"

