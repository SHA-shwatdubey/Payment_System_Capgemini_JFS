name: Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Maven artifacts
        shell: bash
        run: |
          mvn -B -DskipTests clean package

      - name: Build Docker images from source
        shell: bash
        run: |
          docker compose -f docker-compose.yml build

      - name: Save Docker images to tar
        shell: bash
        run: |
          docker save $(docker images -q) -o images.tar

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_PUBLIC_IP }}" >> ~/.ssh/known_hosts

      - name: Copy deployment files to EC2
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} "mkdir -p /home/ubuntu/app"
          scp -i ~/.ssh/deploy_key images.tar ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/home/ubuntu/app/images.tar
          scp -i ~/.ssh/deploy_key docker-compose.yml ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/home/ubuntu/app/docker-compose.yml
          scp -i ~/.ssh/deploy_key -r github-config ubuntu@${{ secrets.EC2_PUBLIC_IP }}:/home/ubuntu/app/

      - name: Deploy to EC2
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          set -e
          echo "Deploying microservices..."
          cd /home/ubuntu/app

          if command -v docker-compose >/dev/null 2>&1; then
            compose_cmd() { sudo docker-compose "$@"; }
          else
            compose_cmd() { sudo docker compose "$@"; }
          fi

          echo "Loading local images..."
          sudo docker load -i /home/ubuntu/app/images.tar

          echo "Stopping existing services..."
          compose_cmd down || true

          echo "Starting services from local images..."
          compose_cmd up -d

          echo "Checking service status..."
          compose_cmd ps

          echo "Services deployed successfully!"
          EOF
            
      - name: Verify Deployment
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "Service URLs:"
          echo "  Frontend:       http://${{ secrets.EC2_PUBLIC_IP }}:8051"
          echo "  Eureka:         http://${{ secrets.EC2_PUBLIC_IP }}:8061"
          echo "  Swagger:        http://${{ secrets.EC2_PUBLIC_IP }}:8062/swagger-ui.html"
          echo "  Config Server:  http://${{ secrets.EC2_PUBLIC_IP }}:8060"
          echo "  RabbitMQ:       http://${{ secrets.EC2_PUBLIC_IP }}:15672"

      - name: Collect diagnostics on failure
        if: failure()
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          set +e
          cd /home/ubuntu/app
          sudo docker compose ps
          echo "--- config-server logs ---"
          sudo docker logs --tail 120 config-server
          echo "--- eureka-server logs ---"
          sudo docker logs --tail 120 eureka-server
          EOF

