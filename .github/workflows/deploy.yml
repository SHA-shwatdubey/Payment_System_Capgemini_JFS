name: Complete CI/CD with AWS Deployment

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'terraform/**'
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  MAVEN_OPTS: -Dmaven.compiler.parameters=true
  REGISTRY: docker.io
  REGISTRY_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-south-1
  TF_IN_AUTOMATION: true

jobs:
  # ============================================
  # STAGE 1: BUILD
  # ============================================
  build:
    name: 🔨 Build Project
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17 for Docker build inputs
        if: steps.docker_creds.outputs.available == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build service JARs for Docker contexts
        if: steps.docker_creds.outputs.available == 'true'
        run: mvn clean package -DskipTests -q
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: 🏗️ Build all modules (skip tests)
        run: mvn clean package -DskipTests -q
      
      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-artifacts
          path: |
            **/target/*.jar
            **/target/classes/
          retention-days: 5
      
      - name: ✅ Build Summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- All modules compiled successfully" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 2: TEST
  # ============================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: 🧪 Run all unit and integration tests
        run: mvn test -q
        env:
          SPRING_CONFIG_IMPORT: 'optional:configserver:'
          SPRING_PROFILES_ACTIVE: test
          EUREKA_CLIENT_ENABLED: 'false'
          SPRING_CLOUD_CONFIG_ENABLED: 'false'
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: postgres
          DATABASE_USER: postgres
          DATABASE_PASSWORD: root
      
      - name: 📤 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 30

  # ============================================
  # STAGE 3: TERRAFORM DEPLOYMENT TO AWS
  # ============================================
  terraform-deploy:
    name: 🏗️ Deploy Infrastructure to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      TF_VAR_nat_gateway_count: "1"
      TF_VAR_db_instance_class: "db.t3.small"
      TF_VAR_node_instance_type: "t3.small"

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧹 Remove committed local Terraform state files
        run: |
          rm -f terraform/terraform.tfstate terraform/terraform.tfstate.backup terraform/.terraform.lock.hcl
      
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
      
      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Resolve DB password input
        id: db_password
        shell: bash
        env:
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD }}
        run: |
          if [[ -n "${DB_PASSWORD_SECRET}" && ${#DB_PASSWORD_SECRET} -ge 8 ]]; then
            echo "tf_var_db_password=${DB_PASSWORD_SECRET}" >> "$GITHUB_OUTPUT"
          else
            echo "tf_var_db_password=" >> "$GITHUB_OUTPUT"
            echo "DB_PASSWORD secret missing/short; Terraform will auto-generate a strong password." >> "$GITHUB_STEP_SUMMARY"
          fi
      
      - name: 🔧 Terraform Init
        run: terraform init -input=false -reconfigure
        working-directory: terraform
      
      - name: 📋 Terraform Format Check
        run: terraform fmt -check
        working-directory: terraform
        continue-on-error: true
      
      - name: 🔍 Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: 🔄 Import existing AWS resources (idempotent)
        working-directory: terraform
        shell: bash
        env:
          TF_VAR_db_password: ${{ steps.db_password.outputs.tf_var_db_password }}
        run: |
          chmod +x ./import_existing_resources.sh
          ./import_existing_resources.sh

      - name: ✅ Verify existing EKS cluster is in Terraform state
        working-directory: terraform
        shell: bash
        run: |
          if aws eks describe-cluster --name payment-system-capgemini-cluster --region "${AWS_REGION}" >/dev/null 2>&1; then
            terraform state show aws_eks_cluster.main >/dev/null
          fi
     

      - name: 📊 Terraform Plan
        run: |
          terraform plan -input=false -lock-timeout=10m -out=tfplan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ steps.db_password.outputs.tf_var_db_password }}

      - name: 📤 Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan
          retention-days: 5

      - name: 🚀 Terraform Apply
        run: |
          terraform apply -input=false -lock-timeout=10m -auto-approve tfplan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ steps.db_password.outputs.tf_var_db_password }}

      - name: 📍 Get Terraform Outputs
        id: terraform
        run: |
          echo "eks_cluster_id=$(terraform output -raw eks_cluster_id)" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$(terraform output -raw rds_address)" >> $GITHUB_OUTPUT
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: 💾 Save Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/terraform.tfstate
          retention-days: 30

      - name: 📝 Deployment Summary
        run: |
          echo "## 🚀 AWS Infrastructure Deployed Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### EKS Cluster" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster ID**: ${{ steps.terraform.outputs.eks_cluster_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Database" >> $GITHUB_STEP_SUMMARY
          echo "- **RDS Endpoint**: ${{ steps.terraform.outputs.rds_endpoint }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Load Balancer" >> $GITHUB_STEP_SUMMARY
          echo "- **ALB DNS**: ${{ steps.terraform.outputs.alb_dns }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Run: \`aws eks update-kubeconfig --name payment-system-capgemini-cluster --region ap-south-1\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Run: \`kubectl apply -f kubernetes/deployment.yaml\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Run: \`kubectl get svc\` to see your application" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 4: DOCKER BUILD & PUSH
  # ============================================
  build-and-push-docker:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: terraform-deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Check Docker credentials
        id: docker_creds
        shell: bash
        run: |
          if [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## 🐳 Docker Stage Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Missing DOCKER_USERNAME and/or DOCKER_PASSWORD secrets." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 🔐 Set up Docker Buildx
        if: steps.docker_creds.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Registry
        if: steps.docker_creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push Docker images
        if: steps.docker_creds.outputs.available == 'true'
        run: |
          echo "🐳 Building and pushing Docker images..."

          SERVICES=(
            "config-server"
            "eureka-server"
            "api-gateway"
            "auth-service"
            "user-kyc-service"
            "wallet-service"
            "notification-service"
            "rewards-service"
            "transaction-service"
            "integration-service"
            "admin-service"
          )

          for service in "${SERVICES[@]}"; do
            echo "🔨 Building $service..."
            docker build -t ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/backend_payment_system_capgemini-${service}:latest ./${service}

            echo "📤 Pushing $service..."
            docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/backend_payment_system_capgemini-${service}:latest
          done

          echo "✅ Docker images built and pushed successfully"

      - name: 📝 Docker Build Summary
        if: steps.docker_creds.outputs.available == 'true'
        run: |
          echo "## 🐳 Docker Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "All microservice images are now available on Docker Hub" >> $GITHUB_STEP_SUMMARY

permissions:
  contents: read
  packages: write
  id-token: write

