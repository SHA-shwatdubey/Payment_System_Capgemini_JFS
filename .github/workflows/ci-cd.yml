name: Build and Test CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MAVEN_OPTS: -Dmaven.compiler.parameters=true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build all modules
      run: mvn clean package -DskipTests -q
    
    - name: Run all tests
      run: mvn test -q
      env:
        SPRING_CONFIG_IMPORT: optional:configserver:
        SPRING_PROFILES_ACTIVE: test
        EUREKA_CLIENT_ENABLED: "false"
        SPRING_CLOUD_CONFIG_ENABLED: "false"
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
        retention-days: 30
    
    - name: Test summary
      if: always()
      run: |
        echo "## 🚀 Build and Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed successfully" >> $GITHUB_STEP_SUMMARY
        echo "✅ All tests executed" >> $GITHUB_STEP_SUMMARY
        echo "📊 Test artifacts uploaded for 30 days" >> $GITHUB_STEP_SUMMARY

