name: Complete CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'terraform/**'
  pull_request:
    branches: [ main, develop ]

env:
  MAVEN_OPTS: -Dmaven.compiler.parameters=true
  REGISTRY: docker.io
  REGISTRY_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ============================================
  # STAGE 1: BUILD
  # ============================================
  build:
    name: 🔨 Build Project
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: 🏗️ Build all modules (skip tests)
        run: mvn clean package -DskipTests -q
      
      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-artifacts
          path: |
            **/target/*.jar
            **/target/classes/
          retention-days: 5
      
      - name: ✅ Build Summary
        if: success()
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- All modules compiled successfully" >> $GITHUB_STEP_SUMMARY
          echo "- JAR artifacts ready for testing" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STAGE 2: TEST
  # ============================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: 🧪 Run all unit and integration tests
        run: mvn test -q
        env:
          SPRING_CONFIG_IMPORT: 'optional:configserver:'
          SPRING_PROFILES_ACTIVE: test
          EUREKA_CLIENT_ENABLED: 'false'
          SPRING_CLOUD_CONFIG_ENABLED: 'false'
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: postgres
          DATABASE_USER: postgres
          DATABASE_PASSWORD: root
      
      - name: 📤 Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 30
      
      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "**/target/surefire-reports" ]; then
            echo "✅ Tests completed - artifacts available for download" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # STAGE 3: DOCKER BUILD & PUSH (optional)
  # ============================================
  build-and-push-docker:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Check Docker credentials
        id: docker_creds
        shell: bash
        run: |
          if [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "## 🐳 Docker Stage Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Missing DOCKER_USERNAME and/or DOCKER_PASSWORD secrets." >> "$GITHUB_STEP_SUMMARY"
          fi
      
      - name: 🔐 Set up Docker Buildx
        if: steps.docker_creds.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3
      
      - name: 🔑 Login to Docker Registry
        if: steps.docker_creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🏗️ Build and push Docker images
        if: steps.docker_creds.outputs.available == 'true'
        run: |
          echo "🐳 Building and pushing Docker images..."
          
          SERVICES=(
            "config-server"
            "eureka-server"
            "api-gateway"
            "auth-service"
            "user-kyc-service"
            "wallet-service"
            "notification-service"
            "rewards-service"
            "transaction-service"
            "integration-service"
            "admin-service"
          )
          
          for service in "${SERVICES[@]}"; do
            echo "🔨 Building $service..."
            docker build -t ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/backend_payment_system_capgemini-${service}:latest ./${service}
            
            echo "📤 Pushing $service..."
            docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/backend_payment_system_capgemini-${service}:latest
          done
          
          echo "✅ Docker images built and pushed successfully"
      
      - name: 📝 Docker Build Summary
        if: steps.docker_creds.outputs.available == 'true'
        run: |
          echo "## 🐳 Docker Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "All microservice images pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY

permissions:
  contents: read
  packages: write
  id-token: write

