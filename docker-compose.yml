        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Frontend
  frontend:
    image: shashwattech/backend_payment_system_capgemini-frontend:latest
    container_name: frontend
    ports:
      - "8051:80"
    networks:
      - microservices
    restart: always
    depends_on:
      - api-gateway

networks:
  microservices:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

