        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Frontend (BUILT LOCALLY)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: local/frontend:latest
    container_name: nexpay-frontend
    ports:
      - "8051:80"
    networks:
      - microservices
    restart: always
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3

