
services:
  # Database
  wallet-postgres:
    image: postgres:16-alpine
    container_name: wallet-postgres
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Queue
  wallet-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: wallet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit loopback_users []"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Config Server (BUILT LOCALLY)
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    image: local/config-server:latest
    container_name: config-server
    environment:
      SERVER_PORT: 8060
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: https://github.com/SHA-shwatdubey/Payment_System_Capgemini_JFS.git
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: main
      SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS: github-config
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
    ports:
      - "8060:8060"
    volumes:
      - ./github-config:/config-repo:ro
    networks:
      - microservices
    restart: always
    depends_on:
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/actuator/info"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 12

  # Service Registry (BUILT LOCALLY)
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: local/eureka-server:latest
    container_name: eureka-server
    environment:
      SERVER_PORT: 8061
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8060
    ports:
      - "8061:8061"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/eureka/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (BUILT LOCALLY)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: local/api-gateway:latest
    container_name: api-gateway
    environment:
      SERVER_PORT: 8062
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
    ports:
      - "8062:8062"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8062/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (BUILT LOCALLY)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: local/auth-service:latest
    container_name: auth-service
    environment:
      SERVER_PORT: 8063
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8060
      SPRING_CLOUD_CONFIG_ENABLED: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@example.com}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER:-}"
    ports:
      - "8063:8063"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # User KYC Service (BUILT LOCALLY)
  user-kyc-service:
    build:
      context: ./user-kyc-service
      dockerfile: Dockerfile
    image: local/user-kyc-service:latest
    container_name: user-kyc-service
    environment:
      SERVER_PORT: 8064
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8064:8064"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Wallet Service (BUILT LOCALLY)
  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile
    image: local/wallet-service:latest
    container_name: wallet-service
    environment:
      SERVER_PORT: 8065
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8065:8065"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Rewards Service (BUILT LOCALLY)
  rewards-service:
    build:
      context: ./rewards-service
      dockerfile: Dockerfile
    image: local/rewards-service:latest
    container_name: rewards-service
