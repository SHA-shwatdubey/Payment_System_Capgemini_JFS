  # ============ MONITORING STACK ============
  
  # Prometheus - Metrics Collection
  prometheus:
    build:
      context: ./docker/prometheus
      dockerfile: Dockerfile
    image: local/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    networks:
      - microservices
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - api-gateway
      - auth-service
      - wallet-service
      - transaction-service
      - notification-service

  # Grafana - Visualization Dashboard
  grafana:
    build:
      context: ./docker/grafana
      dockerfile: Dockerfile
    image: local/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION=true
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SMTP_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/prometheus-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./docker/grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
    networks:
      - microservices
    restart: always
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

