      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8066:8066"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Admin Service (BUILT LOCALLY)
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    image: local/admin-service:latest
    container_name: admin-service
    environment:
      SERVER_PORT: 8067
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8067:8067"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Transaction Service (BUILT LOCALLY)
  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    image: local/transaction-service:latest
    container_name: transaction-service
    environment:
      SERVER_PORT: 8068
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8068:8068"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
