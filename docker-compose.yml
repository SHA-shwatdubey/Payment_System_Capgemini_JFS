  # Frontend (BUILT LOCALLY)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: local/frontend:latest
    container_name: frontend
    ports:
      - "8051:80"
    networks:
      - microservices
    restart: always
    depends_on:
      - api-gateway

networks:
  microservices:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

