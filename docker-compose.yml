      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      RABBITMQ_HOST: wallet-rabbitmq
      RABBITMQ_PORT: 5672
      SPRING_DATA_REDIS_HOST: wallet-redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8068:8068"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      wallet-redis:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Notification Service (BUILT LOCALLY)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    image: local/notification-service:latest
    container_name: notification-service
    environment:
