
services:
  # Database
  wallet-postgres:
    build:
      context: ./docker
      dockerfile: postgres/Dockerfile
    image: local/wallet-postgres:latest
    container_name: wallet-postgres
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Message Queue
  wallet-rabbitmq:
    build:
      context: ./docker
      dockerfile: rabbitmq/Dockerfile
    image: local/wallet-rabbitmq:latest
    container_name: wallet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit loopback_users []"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  wallet-redis:
    image: redis:7-alpine
    container_name: wallet-redis
    ports:
      - "6379:6379"
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices
    restart: always

  # Config Server (BUILT LOCALLY)
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    image: local/config-server:latest
    container_name: config-server
    environment:
      SERVER_PORT: 8060
      SPRING_PROFILES_ACTIVE: native,docker
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo/
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
    ports:
      - "8060:8060"
    volumes:
      - ./github-config:/config-repo:ro
    networks:
      - microservices
    restart: always
    depends_on:
      wallet-postgres:
        condition: service_started
      wallet-rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/actuator/info"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 12

  # Service Registry (BUILT LOCALLY)
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    image: local/eureka-server:latest
    container_name: eureka-server
    environment:
      SERVER_PORT: 8061
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8060
    ports:
      - "8061:8061"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/eureka/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (BUILT LOCALLY)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: local/api-gateway:latest
    container_name: api-gateway
    environment:
      SERVER_PORT: 8062
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      GATEWAY_ALLOWED_ORIGINS: "*"
      JAVA_OPTS: "-Xmx256m -Xms128m"
    ports:
      - "8062:8062"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8062/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (BUILT LOCALLY)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: local/auth-service:latest
    container_name: auth-service
    environment:
      SERVER_PORT: 8063
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8060
      SPRING_CLOUD_CONFIG_ENABLED: "true"
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@example.com}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      TWILIO_FROM_NUMBER: "${TWILIO_FROM_NUMBER:-}"
    ports:
      - "8063:8063"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # User KYC Service (BUILT LOCALLY)
  user-kyc-service:
    build:
      context: ./user-kyc-service
      dockerfile: Dockerfile
    image: local/user-kyc-service:latest
    container_name: user-kyc-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8064:8064"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Wallet Service (BUILT LOCALLY)
  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile
    image: local/wallet-service:latest
    container_name: wallet-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
      RABBITMQ_HOST: wallet-rabbitmq
      RABBITMQ_PORT: 5672
      SPRING_DATA_REDIS_HOST: wallet-redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8065:8065"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      wallet-redis:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Rewards Service (BUILT LOCALLY)
  rewards-service:
    build:
      context: ./rewards-service
      dockerfile: Dockerfile
    image: local/rewards-service:latest
    container_name: rewards-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8066:8066"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  # Admin Service (BUILT LOCALLY)
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    image: local/admin-service:latest
    container_name: admin-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      ZIPKIN_URL: http://zipkin:9411/api/v2/spans
    ports:
      - "8067:8067"
    networks:
      - microservices
    restart: always
    depends_on:
