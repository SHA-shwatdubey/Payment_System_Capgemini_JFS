
services:
  # Database
  wallet-postgres:
    image: postgres:16-alpine
    container_name: wallet-postgres
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Queue
  wallet-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: wallet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Registry
  eureka-server:
    image: shashwattech/backend_payment_system_capgemini-eureka-server:latest
    container_name: eureka-server
    environment:
      SERVER_PORT: 8061
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8060
    ports:
      - "8061:8061"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8061/eureka/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Config Server
  config-server:
    image: shashwattech/backend_payment_system_capgemini-config-server:latest
    container_name: config-server
    environment:
      SERVER_PORT: 8060
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
    ports:
      - "8060:8060"
    volumes:
      - ./github-config:/config-repo:ro
    networks:
      - microservices
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    image: shashwattech/backend_payment_system_capgemini-api-gateway:latest
    container_name: api-gateway
    environment:
      SERVER_PORT: 8062
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
    ports:
      - "8062:8062"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8062/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    image: shashwattech/backend_payment_system_capgemini-auth-service:latest
    container_name: auth-service
    environment:
      SERVER_PORT: 8063
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8063:8063"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # User KYC Service
  user-kyc-service:
    image: shashwattech/backend_payment_system_capgemini-user-kyc-service:latest
    container_name: user-kyc-service
    environment:
      SERVER_PORT: 8064
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8064:8064"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Wallet Service
  wallet-service:
    image: shashwattech/backend_payment_system_capgemini-wallet-service:latest
    container_name: wallet-service
    environment:
      SERVER_PORT: 8065
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8065:8065"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Rewards Service
  rewards-service:
    image: shashwattech/backend_payment_system_capgemini-rewards-service:latest
    container_name: rewards-service
    environment:
      SERVER_PORT: 8066
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8066:8066"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Admin Service
  admin-service:
    image: shashwattech/backend_payment_system_capgemini-admin-service:latest
    container_name: admin-service
    environment:
      SERVER_PORT: 8067
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8067:8067"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Transaction Service
  transaction-service:
    image: shashwattech/backend_payment_system_capgemini-transaction-service:latest
    container_name: transaction-service
    environment:
      SERVER_PORT: 8068
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8068:8068"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Notification Service
  notification-service:
    image: shashwattech/backend_payment_system_capgemini-notification-service:latest
    container_name: notification-service
    environment:
      SERVER_PORT: 8069
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
      - "8069:8069"
    networks:
      - microservices
    restart: always
    depends_on:
      config-server:
        condition: service_healthy
      wallet-postgres:
        condition: service_healthy
      wallet-rabbitmq:
        condition: service_healthy

  # Integration Service
  integration-service:
    image: shashwattech/backend_payment_system_capgemini-integration-service:latest
    container_name: integration-service
    environment:
      SERVER_PORT: 8070
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8061/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8060
      SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: wallet-rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    ports:
