groups:
  - name: microservices
    interval: 30s
    rules:
      # Service Down Alert
      - alert: ServiceDown
        expr: up{job=~"api-gateway|wallet-service|auth-service|transaction-service|notification-service|rewards-service|admin-service|user-kyc-service|integration-service|eureka-server|config-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 2 minutes"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: 'process_cpu_usage{job=~"api-gateway|wallet-service|auth-service|transaction-service|notification-service|rewards-service|admin-service|user-kyc-service|integration-service"} > 0.8'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.job }}"
          description: "CPU usage is above 80% for {{ $labels.job }}"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: 'jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Heap memory usage is above 90% for {{ $labels.job }}"

      # High HTTP Error Rate
      - alert: HighErrorRate
        expr: 'rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is above 5% for {{ $labels.job }}"

      # High Response Time
      - alert: HighResponseTime
        expr: 'histogram_quantile(0.95, http_server_requests_seconds_bucket) > 2'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time on {{ $labels.job }}"
          description: "p95 response time exceeds 2 seconds for {{ $labels.job }}"

      # Database Connection Pool Exhaustion
      - alert: DatabaseConnectionPoolExhaustion
        expr: 'hikaricp_connections_active / hikaricp_connections_max > 0.8'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted on {{ $labels.job }}"
          description: "Active connections are above 80% for {{ $labels.job }}"

