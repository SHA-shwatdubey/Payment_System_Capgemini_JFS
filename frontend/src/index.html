<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Digital Wallet Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f8fafc;
    }

    app-root {
      display: flex;
      width: 100%;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e2e8f0;
      border-top-color: #0d6efd;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      font-size: 14px;
      color: #64748b;
      font-weight: 500;
    }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<app-root>
  <div class="loader">
    <div class="spinner"></div>
    <div class="loader-text">Loading Digital Wallet...</div>
  </div>
</app-root>
<app-root></app-root>
</body>

</html>
