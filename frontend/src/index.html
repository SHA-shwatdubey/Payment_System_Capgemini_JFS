<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Digital Wallet Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0B0F19; /* Dark background to match app */
    }

    app-root {
      display: block; /* Component will manage its own layout */
      width: 100%;
      min-height: 100vh;
    }

    /* Initial loader styles */
    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0B0F19;
      gap: 1.5rem;
    }

    .initial-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(6, 182, 212, 0.1);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: initial-spin 1s linear infinite;
    }

    @keyframes initial-spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 16px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
  <app-root>
    <div class="initial-loader">
      <div class="initial-spinner"></div>
      <div class="loader-text">Loading Digital Wallet...</div>
    </div>
  </app-root>
</body>

</html>
