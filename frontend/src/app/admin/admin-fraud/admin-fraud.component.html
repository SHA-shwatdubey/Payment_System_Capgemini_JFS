<section class="p-8">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-white">Fraud & Risk Monitoring</h1>
    <p class="text-gray-400 mt-2">Monitor and manage fraud alerts and risk flags</p>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center h-64 bg-[#131B2C] rounded-2xl border border-gray-800">
    <div class="animate-spin w-8 h-8 border-2 border-red-500/30 border-t-red-500 rounded-full"></div>
  </div>

  <!-- Alerts List -->
  <div *ngIf="!loading" class="space-y-4">
    <div *ngFor="let alert of alerts"
      class="bg-[#131B2C] rounded-2xl p-6 border-l-4"
      [ngClass]="alert.riskLevel === 'CRITICAL' ? 'border-red-500' : alert.riskLevel === 'HIGH' ? 'border-orange-500' : 'border-yellow-500'">

      <div class="flex items-start justify-between mb-4">
        <div>
          <p class="text-white font-semibold">User #{{ alert.userId }}</p>
          <p class="text-sm text-gray-400 mt-1">{{ alert.reason }}</p>
        </div>
        <span [ngClass]="getRiskLevelColor(alert.riskLevel)" class="px-3 py-1 rounded-full text-xs font-bold border">
          {{ alert.riskLevel }} - {{ alert.riskScore }}/100
        </span>
      </div>

      <div class="flex items-center justify-between pt-4 border-t border-gray-800">
        <p class="text-xs text-gray-500">{{ alert.createdAt | date:'short' }}</p>
        <button
          (click)="resolveAlert(alert.alertId)"
          class="px-4 py-2 rounded-lg bg-green-500/20 text-green-400 border border-green-500/30 hover:bg-green-500/30 text-xs font-semibold transition">
          Mark Resolved
        </button>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="alerts.length === 0" class="text-center p-12 bg-[#131B2C] rounded-2xl border border-gray-800">
      <svg class="w-16 h-16 mx-auto text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text-gray-400 mb-2">System is secure</p>
      <p class="text-gray-500 text-sm">No active fraud alerts</p>
    </div>
  </div>
</section>
