<div class="flex h-screen bg-[#0A0F18]">
  <!-- Admin Sidebar -->
  <aside class="w-64 bg-[#131B2C] border-r border-gray-800 overflow-y-auto">
    <div class="p-6">
      <h2 class="text-xl font-bold text-white mb-2">NexPay Admin</h2>
      <p class="text-xs text-gray-500">Management Portal</p>
    </div>

    <nav class="space-y-2 px-4">
      <!-- Dashboard -->
      <button
        (click)="navigateTo('dashboard')"
        [class.active]="activeMenu === 'dashboard'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-cyan-500/10 hover:text-cyan-400 transition"
        [ngClass]="{ 'bg-cyan-500/20 text-cyan-400 border-l-2 border-cyan-500': activeMenu === 'dashboard' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        Dashboard
      </button>

      <!-- Transactions -->
      <button
        (click)="navigateTo('transactions')"
        [class.active]="activeMenu === 'transactions'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-cyan-500/10 hover:text-cyan-400 transition"
        [ngClass]="{ 'bg-cyan-500/20 text-cyan-400 border-l-2 border-cyan-500': activeMenu === 'transactions' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Transactions
      </button>

      <!-- Disputes -->
      <button
        (click)="navigateTo('disputes')"
        [class.active]="activeMenu === 'disputes'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-red-500/10 hover:text-red-400 transition"
        [ngClass]="{ 'bg-red-500/20 text-red-400 border-l-2 border-red-500': activeMenu === 'disputes' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Disputes
      </button>

      <!-- KYC Approvals -->
      <button
        (click)="navigateTo('kyc')"
        [class.active]="activeMenu === 'kyc'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-blue-500/10 hover:text-blue-400 transition"
        [ngClass]="{ 'bg-blue-500/20 text-blue-400 border-l-2 border-blue-500': activeMenu === 'kyc' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        KYC Approvals
      </button>

      <!-- Fraud Alerts -->
      <button
        (click)="navigateTo('fraud')"
        [class.active]="activeMenu === 'fraud'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-orange-500/10 hover:text-orange-400 transition"
        [ngClass]="{ 'bg-orange-500/20 text-orange-400 border-l-2 border-orange-500': activeMenu === 'fraud' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 4v2M6.5 4h11A2.5 2.5 0 0120 6.5v11a2.5 2.5 0 01-2.5 2.5h-11A2.5 2.5 0 014 17.5v-11A2.5 2.5 0 016.5 4z" />
        </svg>
        Fraud Alerts
      </button>

      <!-- Rewards Management -->
      <button
        (click)="navigateTo('rewards')"
        [class.active]="activeMenu === 'rewards'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-purple-500/10 hover:text-purple-400 transition"
        [ngClass]="{ 'bg-purple-500/20 text-purple-400 border-l-2 border-purple-500': activeMenu === 'rewards' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Rewards
      </button>

      <!-- Analytics -->
      <button
        (click)="navigateTo('analytics')"
        [class.active]="activeMenu === 'analytics'"
        class="w-full text-left px-4 py-3 rounded-lg text-gray-300 hover:bg-green-500/10 hover:text-green-400 transition"
        [ngClass]="{ 'bg-green-500/20 text-green-400 border-l-2 border-green-500': activeMenu === 'analytics' }">
        <svg class="w-5 h-5 inline mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        Analytics
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-auto">
    <router-outlet></router-outlet>
  </main>
</div>

<style>
  .active {
    @apply bg-cyan-500/20 text-cyan-400 border-l-2 border-cyan-500;
  }
</style>
