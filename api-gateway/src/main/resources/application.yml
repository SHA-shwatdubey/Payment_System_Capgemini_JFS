spring:
  application:
    name: api-gateway
  config:
    import: ${SPRING_CONFIG_IMPORT:configserver:http://localhost:8060}
  webflux:
    base-path: /
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${GATEWAY_ALLOWED_ORIGINS:http://localhost:8051}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            exposedHeaders: Authorization
            allowCredentials: false

security:
  jwt:
    secret: ${JWT_SECRET:Q2FwZ2VtaW5pV2FsbGV0SldUU2VjcmV0S2V5Rm9yR2F0ZXdheUFuZFNlcnZpY2VzMTIzNDU2}

gateway:
  rate-limit:
    requests-per-minute: ${GATEWAY_RATE_LIMIT_RPM:120}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    url: /v3/api-docs
    persistAuthorization: true
    disable-swagger-default-url: false
    doc-expansion: none
